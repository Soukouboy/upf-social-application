spring.application.name=application
# ── Connexion ──────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://localhost:3306/upf_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── Hibernate / JPA ────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true


# ── JWT Configuration ───────────────────────────────────────
app.security.jwt.secret=change-this-secret-key-change-this-secret-key-very-long
app.security.jwt.access-token-expiration-ms=3600000
app.security.jwt.refresh-token-expiration-ms=604800000



# ── Logging ───────────────────────────────────────────────

logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE
logging.level.org.springframework.orm.jpa=DEBUG
logging.level.org.springframework.transaction=TRACE
#logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=TRACE
logging.level.org.hibernate.engine.jdbc.spi.SqlExceptionHelper=ERROR